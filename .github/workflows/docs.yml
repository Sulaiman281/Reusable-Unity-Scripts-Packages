# Build and deploy DocFX documentation to GitHub Pages.
#
# Setup (one-time):
#   1. Push this file to your repository.
#   2. Go to Settings → Pages → Source → "Deploy from a branch"
#      Branch: gh-pages  /  Folder: / (root)
#   3. The workflow runs automatically on every push to `main`.
#
# Live URL:  https://Sulaiman281.github.io/Reusable-Unity-Scripts-Packages/

name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # Re-build whenever docs config or source files change
      - "docs/**"
      - "Assets/WitShells/**/*.cs"
      - ".github/workflows/docs.yml"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to push to the gh-pages branch

# Only one deployment at a time; do NOT cancel an in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git-metadata works correctly

      # ── 2. .NET runtime (DocFX requires .NET 8+) ────────────────────────────
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      # ── 3. Install DocFX as a global .NET tool ───────────────────────────────
      - name: Install DocFX
        run: dotnet tool update -g docfx

      # ── 4. Build the documentation site ─────────────────────────────────────
      #   `docs/docfx.json` drives metadata extraction from C# source files
      #   and outputs static HTML to `docs/_site`.
      - name: Build documentation
        run: docfx docs/docfx.json
        env:
          DOCFX_SOURCE_BRANCH_NAME: main

      # ── 5. Deploy _site to the gh-pages branch ───────────────────────────────
      #   peaceiris/actions-gh-pages pushes the built output to `gh-pages`
      #   branch so GitHub Pages can serve it directly from that branch.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_site
          publish_branch: gh-pages
          force_orphan: true          # keep gh-pages branch lean (no history)
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: deploy ${{ github.sha }}"

