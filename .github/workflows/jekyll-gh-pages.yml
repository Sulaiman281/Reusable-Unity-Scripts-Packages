# Builds DocFX documentation and deploys it to GitHub Pages.
# Pages source must be set to "GitHub Actions" in repo Settings → Pages.
#
# Live URL: https://Sulaiman281.github.io/Reusable-Unity-Scripts-Packages/
name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "Assets/WitShells/**/*.cs"
      - ".github/workflows/jekyll-gh-pages.yml"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do NOT cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build documentation
        run: docfx docs/docfx.json
        env:
          DOCFX_SOURCE_BRANCH_NAME: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
